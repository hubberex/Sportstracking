<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOTFORM AI 4.0 — Audio & Gesture Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@400;700&display=swap');

  :root {
    --orange: #FF6B00;
    --black: #080808;
    --dark: #121212;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --good: #2EFF9A;
    --bad: #FF4455;
    --text: #ffffff;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--dark); flex-shrink: 0; }
  .logo { font-family: 'Bebas Neue', sans-serif; color: var(--orange); font-size: 26px; letter-spacing: 3px; }
  
  .layout { display: flex; flex: 1; overflow: hidden; }

  .vwrap { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  video#vid { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  canvas#overlay { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); z-index: 5; pointer-events: none; }

  /* COUNTDOWN OVERLAY */
  #countdown {
    position: absolute; inset: 0; z-index: 100;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4); font-family: 'Bebas Neue';
    font-size: 180px; color: var(--orange); text-shadow: 0 0 30px rgba(255,107,0,0.6);
  }

  .sidebar { width: 380px; background: var(--dark); border-left: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
  
  .score-sec { display: flex; flex-direction: column; align-items: center; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .ring-container { position: relative; width: 85px; height: 85px; }
  .ring-svg { transform: rotate(-90deg); width: 85px; height: 85px; }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 7; }
  .ring-progress { fill: none; stroke: var(--orange); stroke-width: 7; stroke-linecap: round; stroke-dasharray: 251; stroke-dashoffset: 251; transition: stroke-dashoffset 0.5s; }
  .score-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 28px; }

  .gesture-hint {
    background: var(--card); border: 1px solid var(--good); border-radius: 6px; padding: 10px;
    font-size: 10px; color: var(--good); text-align: center; font-family: 'DM Mono';
  }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-box { background: var(--card); padding: 10px; border-radius: 6px; border: 1px solid var(--border); }
  .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: bold; }
  .stat-val { font-family: 'Bebas Neue'; font-size: 22px; color: var(--text); }

  .controls { margin-top: auto; display: flex; flex-direction: column; gap: 6px; padding-top: 10px; }
  .btn-start { background: var(--orange); padding: 18px 50px; font-family: 'Bebas Neue'; font-size: 22px; border: none; cursor: pointer; border-radius: 4px; color: black; font-weight: bold; }
  
  #downloadArea a { display: block; background: var(--good); color: black; text-decoration: none; padding: 10px; text-align: center; border-radius: 4px; font-weight: bold; font-size: 11px; margin-top: 4px; }

  @media (max-width: 750px) {
    .layout { flex-direction: column; }
    .vwrap { flex: none; height: 50vh; }
    .sidebar { width: 100%; height: auto; border-left: none; border-top: 1px solid var(--border); flex: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SHOTFORM PRO <em>4.0</em></div>
  <div id="recStatus" style="font-family: 'DM Mono'; font-size: 10px; color: var(--bad); display: none;">● RECORDING ANALYTICS</div>
</header>

<div class="layout">
  <div class="vwrap" id="container">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="countdown">3</div>
    <div id="idle">
      <button class="btn-start" id="mainLaunchBtn" onclick="launchEngine()">LAUNCH ENGINE</button>
      <p id="loadingMsg" style="color: var(--muted); font-size: 12px; margin-top:10px; font-family:'DM Mono'; display:none;">Initializing AI Model...</p>
    </div>
  </div>

  <div class="sidebar">
    <div class="score-sec">
      <div class="ring-container">
        <svg class="ring-svg"><circle class="ring-bg" cx="42.5" cy="42.5" r="39"/><circle class="ring-progress" id="scoreRing" cx="42.5" cy="42.5" r="39"/></svg>
        <div class="score-text" id="v-total">0</div>
      </div>
    </div>

    <div class="gesture-hint" id="gestureHint">🙌 HOLD ARMS IN "V" ABOVE HEAD TO TRIGGER</div>

    <div class="stats-grid">
      <div class="stat-box"><div class="stat-label">Elbow</div><div class="stat-val" id="v-elbow">0°</div></div>
      <div class="stat-box"><div class="stat-label">Knee</div><div class="stat-val" id="v-knee">0°</div></div>
    </div>

    <div class="controls">
      <div id="downloadArea"></div>
      <button style="background:var(--border); color:white; border:none; padding:10px; border-radius:4px; cursor:pointer;" onclick="location.reload()">STOP / RESET</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

<script>
let detector, stream, isTracking = false, currentPose = null;
let recorder, recordedChunks = [], isRecording = false;
let gestureCounter = 0;

// AUDIO CONTEXT for Beeps
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + duration);
}

async function launchEngine() {
  const btn = document.getElementById('mainLaunchBtn');
  const msg = document.getElementById('loadingMsg');
  btn.style.display = 'none';
  msg.style.display = 'block';

  try {
    // 1. Initialize AI
    if (!detector) {
      detector = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, {
        runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full'
      });
    }

    // 2. Start Camera
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 }, audio: false });
    const vid = document.getElementById('vid');
    vid.srcObject = stream;
    vid.onloadedmetadata = () => {
      vid.play();
      isTracking = true;
      document.getElementById('idle').style.display = 'none';
      resize(); loop();
    };
  } catch (e) {
    alert("Error: Camera access required.");
    btn.style.display = 'block';
    msg.style.display = 'none';
  }
}

function resize() {
  const v = document.getElementById('vid'), c = document.getElementById('overlay');
  const rect = v.getBoundingClientRect();
  c.width = rect.width; c.height = rect.height;
}

async function loop() {
  if (!isTracking) return;
  const vid = document.getElementById('vid'), canvas = document.getElementById('overlay'), ctx = canvas.getContext('2d');
  const poses = await detector.estimatePoses(vid);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (poses && poses.length > 0) {
    currentPose = poses[0];
    const m = calculateMapping(vid, canvas);
    drawSkeleton(ctx, currentPose.keypoints, m);
    updateCoachingLogic(currentPose.keypoints);
    if (!isRecording) checkGesture(currentPose.keypoints);
  }
  requestAnimationFrame(loop);
}

function checkGesture(k) {
  const lw = k[15], rw = k[16], le = k[2], re = k[5], ls = k[11], rs = k[12];
  if (lw.score > 0.6 && rw.score > 0.6) {
    const up = lw.y < le.y && rw.y < re.y;
    const wide = lw.x < ls.x && rw.x > rs.x;
    if (up && wide) {
      gestureCounter++;
      document.getElementById('gestureHint').style.background = `rgba(46, 255, 154, ${gestureCounter/40})`;
      if (gestureCounter > 40) { triggerCountdown(); gestureCounter = 0; }
    } else {
      gestureCounter = 0;
      document.getElementById('gestureHint').style.background = 'var(--card)';
    }
  }
}

async function triggerCountdown() {
  isRecording = true;
  const cd = document.getElementById('countdown');
  cd.style.display = 'flex';
  for (let i = 3; i > 0; i--) {
    cd.textContent = i;
    playSound(600, 'sine', 0.1); // Beep
    await new Promise(r => setTimeout(r, 1000));
  }
  cd.style.display = 'none';
  playSound(1200, 'square', 0.3); // High whistle
  recordClip();
}

function calculateMapping(vid, canvas) {
  const vA = vid.videoWidth / vid.videoHeight, cA = canvas.width / canvas.height;
  let s, oX = 0, oY = 0;
  if (cA > vA) { s = canvas.width / vid.videoWidth; oY = (canvas.height - vid.videoHeight * s) / 2; }
  else { s = canvas.height / vid.videoHeight; oX = (canvas.width - vid.videoWidth * s) / 2; }
  return { s, oX, oY };
}

function drawSkeleton(ctx, k, m) {
  const conn = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
  ctx.strokeStyle = '#FF6B00'; ctx.lineWidth = 4;
  conn.forEach(([i, j]) => { if (k[i].score > 0.5 && k[j].score > 0.5) {
    ctx.beginPath(); ctx.moveTo(k[i].x * m.s + m.oX, k[i].y * m.s + m.oY); ctx.lineTo(k[j].x * m.s + m.oX, k[j].y * m.s + m.oY); ctx.stroke();
  }});
}

function getAngle(p1, p2, p3) {
  const v1 = {x: p1.x-p2.x, y: p1.y-p2.y, z: p1.z-p2.z}, v2 = {x: p3.x-p2.x, y: p3.y-p2.y, z: p3.z-p2.z};
  const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z, m1 = Math.sqrt(v1.x**2+v1.y**2+v1.z**2), m2 = Math.sqrt(v2.x**2+v2.y**2+v2.z**2);
  return Math.round(Math.acos(Math.min(1, Math.max(-1, dot / (m1 * m2)))) * 180 / Math.PI);
}

function updateCoachingLogic(k) {
  const arm = k[15].y < k[16].y ? [11,13,15] : [12,14,16];
  const e = getAngle(k[arm[0]], k[arm[1]], k[arm[2]]);
  const kn = Math.round((getAngle(k[23], k[25], k[27]) + getAngle(k[24], k[26], k[28])) / 2);
  document.getElementById('v-elbow').innerHTML = `${e}°`;
  document.getElementById('v-knee').innerHTML = `${kn}°`;
  const total = Math.max(0, 100 - Math.abs(100 - e) - Math.abs(145 - kn)/2);
  document.getElementById('v-total').textContent = Math.round(total);
  document.getElementById('scoreRing').style.strokeDashoffset = 251 - (251 * total / 100);
}

async function recordClip() {
  document.getElementById('recStatus').style.display = 'block';
  const vid = document.getElementById('vid'), recordCanvas = document.createElement('canvas');
  recordCanvas.width = vid.videoWidth; recordCanvas.height = vid.videoHeight;
  const rCtx = recordCanvas.getContext('2d');
  recordedChunks = [];
  const recorder = new MediaRecorder(recordCanvas.captureStream(30), { mimeType: 'video/webm' });
  recorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
  recorder.onstop = () => {
    document.getElementById('recStatus').style.display = 'none'; isRecording = false;
    const url = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/webm' }));
    const a = document.createElement('a'); a.href = url; a.download = `ShotForm_Remote_${Date.now()}.webm`; a.innerHTML = "💾 SAVE COACHED CLIP";
    document.getElementById('downloadArea').innerHTML = '';
    document.getElementById('downloadArea').appendChild(a);
  };
  const draw = () => { if (recorder.state === "recording") {
    rCtx.save(); rCtx.scale(-1, 1); rCtx.drawImage(vid, -recordCanvas.width, 0, recordCanvas.width, recordCanvas.height); rCtx.restore();
    if (currentPose) drawSkeletonSimple(rCtx, currentPose.keypoints, recordCanvas.width, recordCanvas.height);
    requestAnimationFrame(draw);
  }};
  recorder.start(); draw(); setTimeout(() => recorder.stop(), 5000);
}

function drawSkeletonSimple(ctx, k, w, h) {
  const conn = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
  ctx.strokeStyle = '#FF6B00'; ctx.lineWidth = 5;
  conn.forEach(([i, j]) => { if (k[i].score > 0.5 && k[j].score > 0.5) { ctx.beginPath(); ctx.moveTo(w - k[i].x, k[i].y); ctx.lineTo(w - k[j].x, k[j].y); ctx.stroke(); }});
}

window.addEventListener('resize', resize);
</script>
</body>
</html>
