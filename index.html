<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOTFORM AI 4.2 — Safe Boot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@400;700&display=swap');

  :root {
    --orange: #FF6B00;
    --black: #080808;
    --dark: #121212;
    --border: #2a2a2a;
    --good: #2EFF9A;
    --bad: #FF4455;
    --text: #ffffff;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--dark); flex-shrink: 0; }
  .logo { font-family: 'Bebas Neue', sans-serif; color: var(--orange); font-size: 26px; letter-spacing: 3px; }
  
  .layout { display: flex; flex: 1; overflow: hidden; }

  .vwrap { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  video#vid { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }
  canvas#overlay { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); z-index: 5; pointer-events: none; }

  #countdown {
    position: absolute; inset: 0; z-index: 100;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4); font-family: 'Bebas Neue';
    font-size: 150px; color: var(--orange);
  }

  .sidebar { width: 340px; background: var(--dark); border-left: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
  
  .score-sec { display: flex; flex-direction: column; align-items: center; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .ring-container { position: relative; width: 80px; height: 80px; }
  .ring-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 7; }
  .ring-progress { fill: none; stroke: var(--orange); stroke-width: 7; stroke-linecap: round; stroke-dasharray: 251; stroke-dashoffset: 251; transition: stroke-dashoffset 0.5s; }
  .score-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 24px; }

  .gesture-hint {
    background: #1a1a1a; border: 1px solid var(--good); border-radius: 6px; padding: 10px;
    font-size: 10px; color: var(--good); text-align: center; font-family: 'DM Mono';
  }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-box { background: #1c1c1c; padding: 10px; border-radius: 6px; border: 1px solid var(--border); }
  .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: bold; }
  .stat-val { font-family: 'Bebas Neue'; font-size: 20px; color: var(--text); }

  #idle { position: absolute; inset: 0; z-index: 40; background: var(--black); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .btn-start { background: var(--orange); padding: 16px 40px; font-family: 'Bebas Neue'; font-size: 22px; border: none; cursor: pointer; border-radius: 4px; color: black; font-weight: bold; }
  
  #downloadArea a { display: block; background: var(--good); color: black; text-decoration: none; padding: 10px; text-align: center; border-radius: 4px; font-weight: bold; font-size: 11px; margin-top: 4px; }

  @media (max-width: 750px) {
    .layout { flex-direction: column; }
    .vwrap { height: 50vh; flex: none; }
    .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SHOTFORM PRO <em>4.2</em></div>
  <div id="recStatus" style="font-family: 'DM Mono'; font-size: 10px; color: var(--bad); display: none;">● RECORDING</div>
</header>

<div class="layout">
  <div class="vwrap" id="container">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="countdown">3</div>
    <div id="idle">
      <button class="btn-start" id="launchBtn">LAUNCH ENGINE</button>
      <p id="bootMsg" style="color: var(--muted); font-size: 11px; margin-top:15px; font-family:'DM Mono'; display:none;">BOOTING AI MODULES...</p>
    </div>
  </div>

  <div class="sidebar">
    <div class="score-sec">
      <div class="ring-container">
        <svg class="ring-svg"><circle class="ring-bg" cx="40" cy="40" r="37"/><circle class="ring-progress" id="scoreRing" cx="40" cy="40" r="37"/></svg>
        <div class="score-text" id="v-total">0</div>
      </div>
    </div>
    <div class="gesture-hint" id="gestureHint">🙌 HOLD "V" SHAPE ABOVE HEAD TO START</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-label">Elbow</div><div class="stat-val" id="v-elbow">0°</div></div>
      <div class="stat-box"><div class="stat-label">Knee</div><div class="stat-val" id="v-knee">0°</div></div>
    </div>
    <div class="controls" style="margin-top:auto">
      <div id="downloadArea"></div>
      <button style="background:var(--border); color:white; width:100%; padding:10px; border-radius:4px; border:none; cursor:pointer;" onclick="location.reload()">RELOAD</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3"></script>

<script>
let detector, stream, isTracking = false, currentPose = null, isRecording = false, gestureCounter = 0;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep(f, d) {
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.frequency.value = f; g.gain.value = 0.1;
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + d);
}

async function startEngine() {
  const btn = document.getElementById('launchBtn');
  const msg = document.getElementById('bootMsg');
  btn.style.display = 'none';
  msg.style.display = 'block';

  try {
    // 1. Force WebGL Backend
    msg.textContent = "SETTING GPU BACKEND...";
    await tf.setBackend('webgl');
    await tf.ready();

    // 2. Camera Access
    msg.textContent = "REQUESTING CAMERA...";
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user', width: 640, height: 480 }, 
      audio: false 
    });
    
    const vid = document.getElementById('vid');
    vid.srcObject = stream;
    vid.style.display = 'block';

    // 3. Load Model
    msg.textContent = "LOADING BLAZEPOSE...";
    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.BlazePose, 
      { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full' }
    );

    vid.onloadedmetadata = () => {
      vid.play();
      isTracking = true;
      document.getElementById('idle').style.display = 'none';
      resize(); loop();
    };
  } catch (e) {
    console.error(e);
    alert("BOOT FAILED: Ensure you are on HTTPS and camera is allowed.");
    location.reload();
  }
}

document.getElementById('launchBtn').addEventListener('click', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  startEngine();
});

function resize() {
  const v = document.getElementById('vid'), c = document.getElementById('overlay');
  const rect = v.getBoundingClientRect();
  c.width = rect.width; c.height = rect.height;
}

async function loop() {
  if (!isTracking) return;
  const vid = document.getElementById('vid'), canvas = document.getElementById('overlay'), ctx = canvas.getContext('2d');
  
  try {
    const poses = await detector.estimatePoses(vid, {flipHorizontal: false});
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (poses && poses.length > 0) {
      currentPose = poses[0];
      const m = calculateMapping(vid, canvas);
      drawSkeleton(ctx, currentPose.keypoints, m);
      updateStats(currentPose.keypoints);
      if (!isRecording) checkGesture(currentPose.keypoints);
    }
  } catch(e) {}
  requestAnimationFrame(loop);
}

function checkGesture(k) {
  const lw = k[15], rw = k[16], le = k[2], re = k[5];
  if (lw.score > 0.6 && rw.score > 0.6) {
    if (lw.y < le.y && rw.y < re.y && Math.abs(lw.x - rw.x) > 100) {
      gestureCounter++;
      document.getElementById('gestureHint').style.background = `rgba(46, 255, 154, ${gestureCounter/30})`;
      if (gestureCounter > 30) { triggerCountdown(); gestureCounter = 0; }
    } else {
      gestureCounter = 0;
      document.getElementById('gestureHint').style.background = '#1a1a1a';
    }
  }
}

async function triggerCountdown() {
  isRecording = true;
  const cd = document.getElementById('countdown');
  cd.style.display = 'flex';
  for (let i = 3; i > 0; i--) {
    cd.textContent = i;
    playBeep(600, 0.1);
    await new Promise(r => setTimeout(r, 1000));
  }
  cd.style.display = 'none';
  playBeep(1000, 0.3);
  recordShot();
}

function calculateMapping(vid, canvas) {
  const vA = vid.videoWidth / vid.videoHeight, cA = canvas.width / canvas.height;
  let s, oX = 0, oY = 0;
  if (cA > vA) { s = canvas.width / vid.videoWidth; oY = (canvas.height - vid.videoHeight * s) / 2; }
  else { s = canvas.height / vid.videoHeight; oX = (canvas.width - vid.videoWidth * s) / 2; }
  return { s, oX, oY };
}

function drawSkeleton(ctx, k, m) {
  const conn = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
  ctx.strokeStyle = '#FF6B00'; ctx.lineWidth = 4;
  conn.forEach(([i, j]) => { if (k[i].score > 0.5 && k[j].score > 0.5) {
    ctx.beginPath(); ctx.moveTo(k[i].x * m.s + m.oX, k[i].y * m.s + m.oY); ctx.lineTo(k[j].x * m.s + m.oX, k[j].y * m.s + m.oY); ctx.stroke();
  }});
}

function updateStats(k) {
  const getA = (p1, p2, p3) => {
    const v1 = {x: p1.x-p2.x, y: p1.y-p2.y, z: (p1.z||0)-(p2.z||0)}, v2 = {x: p3.x-p2.x, y: p3.y-p2.y, z: (p3.z||0)-(p2.z||0)};
    const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z, m1 = Math.sqrt(v1.x**2+v1.y**2+v1.z**2), m2 = Math.sqrt(v2.x**2+v2.y**2+v2.z**2);
    return Math.round(Math.acos(Math.min(1, Math.max(-1, dot / (m1 * m2)))) * 180 / Math.PI);
  };
  const elbow = getA(k[11], k[13], k[15]), knee = getA(k[23], k[25], k[27]);
  document.getElementById('v-elbow').textContent = elbow + '°';
  document.getElementById('v-knee').textContent = knee + '°';
  const score = Math.max(0, 100 - Math.abs(100-elbow));
  document.getElementById('v-total').textContent = score;
  document.getElementById('scoreRing').style.strokeDashoffset = 232 - (232 * score / 100);
}

async function recordShot() {
  document.getElementById('recStatus').style.display = 'block';
  const vid = document.getElementById('vid'), recCanvas = document.createElement('canvas');
  recCanvas.width = vid.videoWidth; recCanvas.height = vid.videoHeight;
  const rCtx = recCanvas.getContext('2d');
  let chunks = [];
  const recorder = new MediaRecorder(recCanvas.captureStream(30), { mimeType: 'video/webm' });
  recorder.ondataavailable = (e) => chunks.push(e.data);
  recorder.onstop = () => {
    document.getElementById('recStatus').style.display = 'none'; isRecording = false;
    const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
    const a = document.createElement('a'); a.href = url; a.download = `Shot_${Date.now()}.webm`; a.innerHTML = "💾 SAVE VIDEO CLIP";
    document.getElementById('downloadArea').innerHTML = ''; document.getElementById('downloadArea').appendChild(a);
  };
  const draw = () => { if (recorder.state === "recording") {
    rCtx.save(); rCtx.scale(-1, 1); rCtx.drawImage(vid, -recCanvas.width, 0, recCanvas.width, recCanvas.height); rCtx.restore();
    if (currentPose) drawSkeletonSimple(rCtx, currentPose.keypoints, recCanvas.width, recCanvas.height);
    requestAnimationFrame(draw);
  }};
  recorder.start(); draw(); setTimeout(() => recorder.stop(), 5000);
}

function drawSkeletonSimple(ctx, k, w, h) {
  const conn = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
  ctx.strokeStyle = '#FF6B00'; ctx.lineWidth = 5;
  conn.forEach(([i, j]) => { if (k[i].score > 0.5 && k[j].score > 0.5) { ctx.beginPath(); ctx.moveTo(w - k[i].x, k[i].y); ctx.lineTo(w - k[j].x, k[j].y); ctx.stroke(); }});
}

window.addEventListener('resize', resize);
</script>
</body>
</html>
