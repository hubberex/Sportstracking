<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOTFORM AI 3.6 — Expanded View</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@400;700&display=swap');

  :root {
    --orange: #FF6B00;
    --black: #080808;
    --dark: #121212;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --good: #2EFF9A;
    --warn: #FFD93D;
    --bad: #FF4455;
    --text: #ffffff;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--dark); flex-shrink: 0; }
  .logo { font-family: 'Bebas Neue', sans-serif; color: var(--orange); font-size: 26px; letter-spacing: 3px; }
  
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* VIDEO ENGINE - Fixed for Mobile */
  .vwrap { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  video#vid { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  canvas#overlay { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); z-index: 5; pointer-events: none; }

  /* SIDEBAR DASHBOARD */
  .sidebar { width: 360px; background: var(--dark); border-left: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
  
  .score-sec { display: flex; flex-direction: column; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .ring-container { position: relative; width: 90px; height: 90px; }
  .ring-svg { transform: rotate(-90deg); width: 90px; height: 90px; }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
  .ring-progress { fill: none; stroke: var(--orange); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 283; stroke-dashoffset: 283; transition: stroke-dashoffset 0.5s; }
  .score-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 28px; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-box { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid var(--border); position: relative; overflow: hidden; }
  .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
  .stat-val { font-family: 'Bebas Neue'; font-size: 24px; color: var(--text); }
  .stat-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--orange); transition: width 0.3s; }

  /* DURATION TOGGLE */
  .toggle-wrap { display: flex; background: var(--black); border-radius: 6px; padding: 4px; border: 1px solid var(--border); margin-top: 5px; }
  .tgl-btn { flex: 1; border: none; background: transparent; color: var(--muted); padding: 8px; font-family: 'Bebas Neue'; font-size: 14px; cursor: pointer; border-radius: 4px; }
  .tgl-btn.active { background: var(--orange); color: black; }

  .log-container { flex: 1; min-height: 120px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 6px; padding: 10px; border: 1px solid var(--border); }
  .log-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .log-table th { text-align: left; color: var(--muted); padding-bottom: 5px; border-bottom: 1px solid var(--border); }
  .log-table td { padding: 6px 0; border-bottom: 1px solid #222; }

  .controls { margin-top: auto; display: flex; flex-direction: column; gap: 8px; padding-top: 15px; }
  .btn { border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-family: 'Inter'; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
  .btn-rec { background: #ff4444; color: white; }
  .btn-stop { background: var(--border); color: white; font-size: 12px; }
  
  #idle { position: absolute; inset: 0; z-index: 40; background: var(--black); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  .btn-start { background: var(--orange); padding: 18px 50px; font-family: 'Bebas Neue'; font-size: 22px; border: none; cursor: pointer; border-radius: 4px; }

  @media (max-width: 750px) {
    .layout { flex-direction: column; }
    .vwrap { flex: none; height: 60vh; } /* Forces camera window to be 60% of screen height */
    .sidebar { width: 100%; height: auto; border-left: none; border-top: 1px solid var(--border); flex: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SHOTFORM PRO <em>3.6</em></div>
  <div id="recStatus" style="font-family: 'DM Mono'; font-size: 10px; color: var(--bad); display: none;">● RECORDING</div>
</header>

<div class="layout">
  <div class="vwrap" id="container">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="idle"><button class="btn-start" onclick="startCamera()">START ENGINE</button></div>
  </div>

  <div class="sidebar">
    <div class="score-sec">
      <div class="ring-container">
        <svg class="ring-svg"><circle class="ring-bg" cx="45" cy="45" r="40"/><circle class="ring-progress" id="scoreRing" cx="45" cy="45" r="40"/></svg>
        <div class="score-text" id="v-total">0</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-box"><div class="stat-label">Elbow</div><div class="stat-val" id="v-elbow">0°</div><div class="stat-bar" id="bar-elbow"></div></div>
      <div class="stat-box"><div class="stat-label">Knee</div><div class="stat-val" id="v-knee">0°</div><div class="stat-bar" id="bar-knee"></div></div>
    </div>

    <div style="margin-top: 5px;">
      <div style="font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: bold; margin-bottom: 4px;">Clip Duration</div>
      <div class="toggle-wrap">
        <button class="tgl-btn active" id="tgl5" onclick="setDuration(5)">5s</button>
        <button class="tgl-btn" id="tgl10" onclick="setDuration(10)">10s</button>
      </div>
    </div>

    <div class="log-container">
      <table class="log-table">
        <thead><tr><th>TIME</th><th>SCORE</th><th>WEAKNESS</th></tr></thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>

    <div class="controls">
      <button class="btn btn-rec" id="recBtn" onclick="recordClip()" disabled>RECORD CLIP</button>
      <button class="btn btn-stop" onclick="stopSession()">STOP CAMERA</button>
      <div id="downloadArea"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

<script>
let detector, stream, isTracking = false, currentPose = null;
let recorder, recordedChunks = [], clipDuration = 5;

async function init() {
  detector = await poseDetection.createDetector(poseDetection.SupportedModels.BlazePose, {
    runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose', modelType: 'full'
  });
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 }, audio: false });
    document.getElementById('vid').srcObject = stream;
    document.getElementById('vid').onloadedmetadata = () => {
      document.getElementById('vid').play();
      isTracking = true;
      document.getElementById('idle').style.display = 'none';
      document.getElementById('recBtn').disabled = false;
      resize();
      loop();
    };
  } catch (e) { alert("Camera Error"); }
}

function resize() {
  const v = document.getElementById('vid'), c = document.getElementById('overlay');
  const rect = v.getBoundingClientRect();
  c.width = rect.width; c.height = rect.height;
}

function setDuration(sec) {
  clipDuration = sec;
  document.getElementById('tgl5').classList.toggle('active', sec === 5);
  document.getElementById('tgl10').classList.toggle('active', sec === 10);
}

function stopSession() {
  isTracking = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
  document.getElementById('idle').style.display = 'flex';
}

async function loop() {
  if (!isTracking) return;
  const vid = document.getElementById('vid'), canvas = document.getElementById('overlay'), ctx = canvas.getContext('2d');
  const poses = await detector.estimatePoses(vid);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (poses && poses.length > 0) {
    currentPose = poses[0];
    const m = calculateMapping(vid, canvas);
    drawSkeleton(ctx, currentPose.keypoints, m);
    updateAnalytics(currentPose.keypoints);
  }
  requestAnimationFrame(loop);
}

function calculateMapping(vid, canvas) {
  const vA = vid.videoWidth / vid.videoHeight, cA = canvas.width / canvas.height;
  let s, oX = 0, oY = 0;
  if (cA > vA) { s = canvas.width / vid.videoWidth; oY = (canvas.height - vid.videoHeight * s) / 2; }
  else { s = canvas.height / vid.videoHeight; oX = (canvas.width - vid.videoWidth * s) / 2; }
  return { s, oX, oY };
}

function drawSkeleton(ctx, k, m) {
  const conn = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
  ctx.strokeStyle = '#FF6B00'; ctx.lineWidth = 4;
  conn.forEach(([i, j]) => {
    if (k[i].score > 0.5 && k[j].score > 0.5) {
      ctx.beginPath();
      ctx.moveTo(k[i].x * m.s + m.oX, k[i].y * m.s + m.oY);
      ctx.lineTo(k[j].x * m.s + m.oX, k[j].y * m.s + m.oY);
      ctx.stroke();
    }
  });
}

function updateAnalytics(k) {
  const getA = (p1, p2, p3) => {
    const v1 = {x: p1.x-p2.x, y: p1.y-p2.y, z: p1.z-p2.z}, v2 = {x: p3.x-p2.x, y: p3.y-p2.y, z: p3.z-p2.z};
    const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z, m1 = Math.sqrt(v1.x**2+v1.y**2+v1.z**2), m2 = Math.sqrt(v2.x**2+v2.y**2+v2.z**2);
    return Math.round(Math.acos(dot/(m1*m2))*180/Math.PI);
  };
  const arm = k[15].y < k[16].y ? [11,13,15] : [12,14,16];
  const e = getA(k[arm[0]], k[arm[1]], k[arm[2]]), kn = Math.round((getA(k[23], k[25], k[27]) + getA(k[24], k[26], k[28])) / 2);
  const sE = e > 85 && e < 115 ? 100 : Math.max(0, 100 - Math.abs(100 - e) * 2), sK = kn > 135 && kn < 160 ? 100 : Math.max(0, 100 - Math.abs(145 - kn) * 1.5);
  document.getElementById('v-elbow').textContent = e + '°'; document.getElementById('bar-elbow').style.width = sE + '%';
  document.getElementById('v-knee').textContent = kn + '°'; document.getElementById('bar-knee').style.width = sK + '%';
  const total = Math.round((sE + sK) / 2); document.getElementById('v-total').textContent = total;
  document.getElementById('scoreRing').style.strokeDashoffset = 251 - (251 * total / 100);
}

async function recordClip() {
  const btn = document.getElementById('recBtn'), stat = document.getElementById('recStatus');
  btn.disabled = true; stat.style.display = 'block';
  const vid = document.getElementById('vid'), recordCanvas = document.createElement('canvas');
  recordCanvas.width = vid.videoWidth; recordCanvas.height = vid.videoHeight;
  const rCtx = recordCanvas.getContext('2d');
  recordedChunks = [];
  const stream = recordCanvas.captureStream(30);
  recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
  recorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
  recorder.onstop = () => {
    stat.style.display = 'none'; btn.disabled = false;
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob), a = document.createElement('a');
    a.href = url; a.download = `Shot_${clipDuration}s_${Date.now()}.webm`; a.textContent = "⬇️ DOWNLOAD CLIP";
    a.style.display = "block"; a.style.color = "var(--orange)"; a.style.textAlign="center";
    document.getElementById('downloadArea').innerHTML = ''; document.getElementById('downloadArea').appendChild(a);
    logShot();
  };
  const draw = () => {
    if (recorder.state === "recording") {
      rCtx.save(); rCtx.scale(-1, 1); rCtx.drawImage(vid, -recordCanvas.width, 0, recordCanvas.width, recordCanvas.height); rCtx.restore();
      if (currentPose) drawSkeletonSimple(rCtx, currentPose.keypoints, recordCanvas.width, recordCanvas.height);
      requestAnimationFrame(draw);
    }
  };
  recorder.start(); draw();
  setTimeout(() => recorder.stop(), clipDuration * 1000);
}

function drawSkeletonSimple(ctx, k, w, h) {
  const conn = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
  ctx.strokeStyle = '#FF6B00'; ctx.lineWidth = 5;
  conn.forEach(([i, j]) => { if (k[i].score > 0.5 && k[j].score > 0.5) { ctx.beginPath(); ctx.moveTo(w - k[i].x, k[i].y); ctx.lineTo(w - k[j].x, k[j].y); ctx.stroke(); } });
}

function logShot() {
  const score = document.getElementById('v-total').textContent;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const row = `<tr><td>${time}</td><td style="color:var(--orange)">${score}%</td><td>${parseInt(score)>80?'Clean':'Check Elbow'}</td></tr>`;
  document.getElementById('logBody').innerHTML = row + document.getElementById('logBody').innerHTML;
}

window.addEventListener('resize', resize);
init();
</script>
</body>
</html>
