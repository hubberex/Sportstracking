<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOTFORM AI Pro — Centered Tracking</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --orange: #FF6B00;
    --black: #080808;
    --dark: #0f0f0f;
    --border: #272727;
    --text: #EBEBEB;
    --muted: #555;
    --good: #2EFF9A;
    --warn: #FFD93D;
    --bad: #FF4455;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 22px; border-bottom: 1px solid var(--border); background: var(--dark); flex-shrink: 0; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 4px; color: var(--orange); }
  .ai-pill { display: flex; align-items: center; gap: 7px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); padding: 4px 11px; border: 1px solid var(--border); border-radius: 20px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .dot.live { background: var(--orange); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .layout { display: grid; grid-template-columns: 1fr 330px; flex: 1; overflow: hidden; }

  .vcol { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); position: relative; }
  .vwrap { flex: 1; position: relative; background: #000; overflow: hidden; }

  video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }
  canvas#overlay { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; display: none; z-index: 5; }

  #idle { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 10; background: var(--black); }
  .btn-main { background: var(--orange); color: #000; border: none; padding: 14px 40px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; cursor: pointer; border-radius: 4px; }

  .sidebar { background: var(--dark); padding: 20px; display: flex; flex-direction: column; gap: 25px; overflow-y: auto; }
  .sec-lbl { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }
  
  .achip { background: var(--mid); padding: 10px; border: 1px solid var(--border); border-radius: 6px; text-align: center; }
  .acv { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--orange); }

  @media (max-width: 750px) { .layout { grid-template-columns: 1fr; } .sidebar { display: none; } }
</style>
</head>
<body>

<header>
  <div class="logo">SHOT<em>FORM</em> PRO</div>
  <div class="ai-pill"><div class="dot live" id="aiDot"></div> <span id="aiTxt">3D BLAZEPOSE</span></div>
</header>

<div class="layout">
  <div class="vcol">
    <div class="vwrap" id="vwrap">
      <video id="vid" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="idle">
        <button class="btn-main" onclick="startCamera()">START TRACKER</button>
        <p style="color:var(--muted); font-size: 12px;">Ensure full body is visible</p>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sec">
      <div class="sec-lbl">Live 3D Angles</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="achip"><div class="acv" id="a-elbow">—</div><div style="font-size:10px">ELBOW</div></div>
        <div class="achip"><div class="acv" id="a-knee">—</div><div style="font-size:10px">KNEE</div></div>
      </div>
    </div>
    <div class="sec">
        <div class="sec-lbl">Vertical Offset</div>
        <input type="range" id="yOffset" min="-100" max="100" value="0" style="width:100%">
        <div style="font-size: 10px; color: var(--muted); margin-top: 5px;">Adjust if skeleton is too low/high</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

<script>
let detector, stream, isTracking = false;
const yOffsetSlider = document.getElementById('yOffset');

async function init() {
  const model = poseDetection.SupportedModels.BlazePose;
  detector = await poseDetection.createDetector(model, {
    runtime: 'mediapipe',
    solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/pose',
    modelType: 'full'
  });
}

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 }, audio: false });
  const vid = document.getElementById('vid');
  vid.srcObject = stream;
  vid.onloadedmetadata = () => {
    vid.play();
    isTracking = true;
    document.getElementById('idle').style.display = 'none';
    document.getElementById('vid').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
    resize();
    loop();
  };
}

function resize() {
  const v = document.getElementById('vid');
  const c = document.getElementById('overlay');
  c.width = v.clientWidth;
  c.height = v.clientHeight;
}

async function loop() {
  if (!isTracking) return;
  const vid = document.getElementById('vid');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');

  const poses = await detector.estimatePoses(vid);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (poses && poses.length > 0) {
    const pose = poses[0];
    drawPose(ctx, pose.keypoints, canvas.width, canvas.height);
    updateAngles(pose.keypoints);
  }
  requestAnimationFrame(loop);
}

function drawPose(ctx, keypoints, cw, ch) {
  const offset = parseInt(yOffsetSlider.value);
  
  // BlazePose Skeleton Connections
  const connections = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];

  ctx.strokeStyle = '#FF6B00';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';

  connections.forEach(([i, j]) => {
    const kp1 = keypoints[i];
    const kp2 = keypoints[j];
    if (kp1.score > 0.5 && kp2.score > 0.5) {
      ctx.beginPath();
      // Apply offset to Y coordinates
      ctx.moveTo(kp1.x * (cw/640), (kp1.y * (ch/480)) + offset);
      ctx.lineTo(kp2.x * (cw/640), (kp2.y * (ch/480)) + offset);
      ctx.stroke();
    }
  });

  keypoints.forEach((kp, i) => {
    if (kp.score > 0.5 && i > 10) {
      ctx.fillStyle = '#2EFF9A';
      ctx.beginPath();
      ctx.arc(kp.x * (cw/640), (kp.y * (ch/480)) + offset, 5, 0, Math.PI*2);
      ctx.fill();
    }
  });
}

function updateAngles(k) {
    const getA = (p1, p2, p3) => {
        const v1 = {x:p1.x-p2.x, y:p1.y-p2.y, z:p1.z-p2.z};
        const v2 = {x:p3.x-p2.x, y:p3.y-p2.y, z:p3.z-p2.z};
        const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const m1 = Math.sqrt(v1.x**2+v1.y**2+v1.z**2);
        const m2 = Math.sqrt(v2.x**2+v2.y**2+v2.z**2);
        return Math.round(Math.acos(dot/(m1*m2))*180/Math.PI);
    };
    document.getElementById('a-elbow').textContent = getA(k[11], k[13], k[15]) + '°';
    document.getElementById('a-knee').textContent = getA(k[23], k[25], k[27]) + '°';
}

window.addEventListener('resize', resize);
init();
</script>
</body>
</html>
